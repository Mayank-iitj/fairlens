version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: fairlens
      POSTGRES_USER: fairlens
      POSTGRES_PASSWORD: fairlens
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - '6380:6379'

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: fairlens
      MINIO_ROOT_PASSWORD: fairlens-secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
      - ./backend/.env
    depends_on:
      - postgres
      - redis
      - minio
    ports:
      - '8001:8000'
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app

  worker:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
      - ./backend/.env
    depends_on:
      - backend
      - redis
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info -Q audits
    volumes:
      - ./backend:/app

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - '5174:5173'
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
