name: FairLens CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-bias-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend smoke check
        working-directory: backend
        run: python -c "from app.main import app; print(app.title)"

      # Template from product spec:
      # - name: Run FairLens Bias Gate
      #   uses: fairlens/bias-action@v1
      #   with:
      #     api_key: ${{ secrets.FAIRLENS_API_KEY }}
      #     dataset: ./tests/evaluation_data.csv
      #     model: ./models/model.pkl
      #     target: outcome
      #     sensitive: gender,race
      #     max_disparate_impact_violation: 0.8
      #     fail_on: flagged

      - name: Run FairLens Bias Gate (fallback)
        run: |
          echo "Bias gate placeholder: call FairLens API/CLI here and fail on flagged verdict."
          echo "status=passed"
