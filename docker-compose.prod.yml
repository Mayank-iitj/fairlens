version: '3.9'

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: fairlens
      POSTGRES_USER: fairlens
      POSTGRES_PASSWORD: fairlens
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fairlens -d fairlens"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: fairlens
      MINIO_ROOT_PASSWORD: fairlens-secret
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.example
      - ./backend/.env
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      DOCS_ENABLED: "false"
      DATABASE_URL: postgresql+psycopg2://fairlens:fairlens@postgres:5432/fairlens
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MINIO_ENDPOINT: minio:9000
      CORS_ORIGINS: '["http://localhost:5173"]'
      ALLOWED_HOSTS: '["localhost", "127.0.0.1"]'
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 20s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.example
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://fairlens:fairlens@postgres:5432/fairlens
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MINIO_ENDPOINT: minio:9000
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info -Q audits

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 20s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  minio_data:
