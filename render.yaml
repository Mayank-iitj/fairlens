# yaml-language-server: $schema=https://render.com/schema/render.yaml.json
services:
  - type: redis
    name: fairlens-redis
    plan: free
    ipAllowList: []

  - type: web
    name: fairlens-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    rootDir: .
    autoDeploy: true
    healthCheckPath: /health
    startCommand: bash -lc "cd /app && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: DOCS_ENABLED
        value: "false"
      - key: CORS_ORIGINS
        value: '["https://YOUR-FRONTEND.vercel.app"]'
      - key: ALLOWED_HOSTS
        value: '["fairlens-api.onrender.com"]'
      - key: DATABASE_URL
        fromDatabase:
          name: fairlens-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: fairlens-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: fairlens-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: fairlens-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false

  - type: worker
    name: fairlens-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    rootDir: .
    autoDeploy: true
    startCommand: bash -lc "cd /app && celery -A app.tasks.celery_app.celery_app worker --loglevel=info -Q audits"
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: fairlens-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: fairlens-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: fairlens-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: fairlens-redis
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

databases:
  - name: fairlens-db
    databaseName: fairlens
    user: fairlens
